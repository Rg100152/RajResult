<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🎓 RajResult · Smart University Result Portal</title>
  <style>
    /* ---------- GLOBAL VARIABLES ---------- */
    :root {
      --bg: #050816;
      --card: #121826;
      --primary: #6366F1;
      --secondary: #3B82F6;
      --accent: #06B6D4;
      --success: #22C55E;
      --warning: #FACC15;
      --danger: #EF4444;
      --text: #FFFFFF;
      --text-secondary: #94a3b8;
      --glass-bg: rgba(18,24,38,0.8);
      --glass-border: rgba(99,102,241,0.2);
      --radius: 18px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      --shadow: 0 10px 30px rgba(0,0,0,0.5);
      --gradient-1: linear-gradient(135deg, #6366F1, #3B82F6);
      --gradient-2: linear-gradient(135deg, #06B6D4, #22C55E);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }
    /* Particle canvas */
    #particleCanvas {
      position: fixed; top:0; left:0; width:100%; height:100%;
      pointer-events: none; z-index:0; opacity:0.5;
    }
    /* Navbar */
    .navbar {
      display:flex; justify-content:space-between; align-items:center;
      padding:1rem 2rem; background:rgba(5,8,22,0.9);
      backdrop-filter:blur(20px); border-bottom:1px solid rgba(255,255,255,0.06);
      position:sticky; top:0; z-index:100; flex-wrap:wrap; gap:1rem;
    }
    .logo {
      font-size:1.6rem; font-weight:800; cursor:pointer;
      background: var(--gradient-1); -webkit-background-clip:text;
      -webkit-text-fill-color:transparent; background-clip:text;
      display:flex; align-items:center; gap:0.4rem;
    }
    .nav-links { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; }
    .nav-links a {
      color:var(--text-secondary); text-decoration:none; font-weight:500;
      font-size:0.85rem; cursor:pointer; transition:color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color:var(--accent); }
    .btn {
      padding:0.6rem 1.5rem; border-radius:2rem; font-weight:600;
      border:none; cursor:pointer; transition:all 0.3s; display:inline-flex;
      align-items:center; gap:0.4rem; font-size:0.9rem; text-decoration:none;
    }
    .btn-primary { background:var(--gradient-1); color:white; box-shadow:0 4px 15px rgba(99,102,241,0.3); }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 25px rgba(99,102,241,0.5); }
    .btn-outline { border:2px solid var(--primary); color:var(--primary); background:transparent; }
    .btn-outline:hover { background:var(--primary); color:white; }
    .btn-sm { padding:0.4rem 1rem; font-size:0.8rem; }
    /* Pages */
    .page { display:none; animation:fadeSlide 0.5s ease; }
    .page.active { display:block; }
    @keyframes fadeSlide {
      from { opacity:0; transform:translateY(16px); }
      to { opacity:1; transform:translateY(0); }
    }
    .container { max-width:1200px; margin:0 auto; padding:2rem 1.5rem; position:relative; z-index:2; }
    /* Glass card */
    .glass {
      background:var(--glass-bg); backdrop-filter:blur(18px);
      border:1px solid var(--glass-border); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:1.8rem; transition:var(--transition);
    }
    .glass:hover { border-color:var(--primary); transform:translateY(-4px); }
    /* Grids */
    .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
    .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:1.5rem; }
    .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:1.5rem; }
    .stat-value { font-size:2.4rem; font-weight:800; letter-spacing:1px; }
    .form-group { margin-bottom:1rem; }
    .form-group label { display:block; font-weight:500; color:var(--text-secondary); margin-bottom:0.3rem; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; padding:0.8rem 1rem; background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.15); border-radius:12px;
      color:white; outline:none; transition:border 0.2s;
    }
    .form-group input:focus { border-color:var(--accent); }
    .toast {
      position:fixed; top:1rem; right:1rem; background:var(--success);
      color:white; padding:0.8rem 1.5rem; border-radius:12px;
      z-index:9999; font-weight:600; animation:slideRight 0.4s ease;
    }
    @keyframes slideRight {
      from { transform:translateX(120%); opacity:0; }
      to { transform:translateX(0); opacity:1; }
    }
    table { width:100%; border-collapse:collapse; background:rgba(255,255,255,0.03); border-radius:12px; overflow:hidden; }
    th, td { padding:0.8rem; text-align:left; border-bottom:1px solid rgba(255,255,255,0.08); }
    th { background:rgba(99,102,241,0.15); }
    @media (max-width:768px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns:1fr; }
      .navbar { flex-direction:column; align-items:flex-start; }
    }
    .hidden { display:none !important; }
  </style>
</head>
<body>
  <canvas id="particleCanvas"></canvas>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="logo" onclick="navigateTo('home')">🎓 RajResult</div>
    <div class="nav-links" id="navLinks">
      <a onclick="navigateTo('home')">Home</a>
      <a onclick="navigateTo('login')" id="navLogin">Login</a>
      <a onclick="navigateTo('register')" id="navRegister">Register</a>
      <a onclick="navigateTo('dashboard')" id="navDashboard" style="display:none;">Dashboard</a>
      <a onclick="navigateTo('search')" id="navSearch" style="display:none;">Search</a>
      <a onclick="navigateTo('previous')" id="navPrevious" style="display:none;">Previous</a>
      <a onclick="navigateTo('analytics')" id="navAnalytics" style="display:none;">Analytics</a>
      <a onclick="navigateTo('profile')" id="navProfile" style="display:none;">Profile</a>
      <a onclick="navigateTo('notifications')" id="navNotifications" style="display:none;">Notices</a>
      <a onclick="navigateTo('about')">About</a>
      <a onclick="navigateTo('contact')">Contact</a>
      <button class="btn btn-sm" style="background:var(--danger);" id="logoutBtn" onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- Main Content Container -->
  <div class="container" id="mainContent"></div>

  <script>
    // ==================== MOCK DATA & STATE ====================
    const STORAGE_KEY = 'rajresult_db';
    const defaultData = {
      students: {
        'ENR2024001': {
          profile: {
            name: 'Riya Sharma',
            enrollment: 'ENR2024001',
            roll: '2024CS01',
            course: 'B.Sc. Computer Science',
            semester: 4,
            email: 'riya@example.com',
            mobile: '9876543210',
            dob: '2004-05-12',
            photo: null
          },
          results: [
            { sem:1, subjects:[
              {name:'Programming Fundamentals', internal:24, external:62, total:86, grade:'A'},
              {name:'Mathematics I', internal:28, external:58, total:86, grade:'A'},
              {name:'Digital Logic', internal:22, external:55, total:77, grade:'B+'},
              {name:'Communication Skills', internal:26, external:60, total:86, grade:'A'}
            ], sgpa:8.6, cgpa:8.6 },
            { sem:2, subjects:[
              {name:'Data Structures', internal:25, external:65, total:90, grade:'A+'},
              {name:'Mathematics II', internal:27, external:60, total:87, grade:'A'},
              {name:'Computer Organization', internal:23, external:58, total:81, grade:'B+'},
              {name:'Environmental Studies', internal:28, external:62, total:90, grade:'A+'}
            ], sgpa:8.8, cgpa:8.7 },
            { sem:3, subjects:[
              {name:'OOP with Java', internal:26, external:68, total:94, grade:'A+'},
              {name:'DBMS', internal:24, external:60, total:84, grade:'A'},
              {name:'Operating Systems', internal:22, external:55, total:77, grade:'B+'},
              {name:'Discrete Math', internal:27, external:63, total:90, grade:'A+'}
            ], sgpa:8.7, cgpa:8.7 },
            { sem:4, subjects:[
              {name:'Software Engineering', internal:25, external:66, total:91, grade:'A+'},
              {name:'Computer Networks', internal:24, external:62, total:86, grade:'A'},
              {name:'Web Technologies', internal:28, external:70, total:98, grade:'A+'},
              {name:'AI Basics', internal:23, external:58, total:81, grade:'B+'}
            ], sgpa:9.0, cgpa:8.8 }
          ],
          attendance: 82
        }
      }
    };

    // Load or initialize data
    let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultData;
    // Ensure default exists
    if (!db.students['ENR2024001']) {
      db = defaultData;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(db));
    }

    // Current user session
    let currentStudent = null;

    // ==================== UTILS ====================
    function saveDB() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); }
    function showToast(msg, type='success') {
      const toast = document.createElement('div'); toast.className='toast';
      toast.style.background = type==='error'? 'var(--danger)' : 'var(--success)';
      toast.textContent = msg; document.body.appendChild(toast);
      setTimeout(()=>toast.remove(), 3000);
    }

    // ==================== NAVIGATION ====================
    function navigateTo(page) {
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
      const content = document.getElementById('mainContent');
      let html = '';
      switch(page) {
        case 'home': html = homePage(); break;
        case 'login': html = loginPage(); break;
        case 'register': html = registerPage(); break;
        case 'dashboard': html = dashboardPage(); break;
        case 'search': html = searchPage(); break;
        case 'result': html = renderResultPage(); break;
        case 'previous': html = previousResultsPage(); break;
        case 'analytics': html = analyticsPage(); break;
        case 'profile': html = profilePage(); break;
        case 'notifications': html = notificationsPage(); break;
        case 'about': html = aboutPage(); break;
        case 'contact': html = contactPage(); break;
        default: html = homePage();
      }
      content.innerHTML = html;
      // Attach event listeners
      if (page === 'login') document.getElementById('loginForm')?.addEventListener('submit', handleLogin);
      if (page === 'register') document.getElementById('registerForm')?.addEventListener('submit', handleRegister);
      if (page === 'search') document.getElementById('searchBtn')?.addEventListener('click', searchResult);
      if (page === 'analytics') drawAnalyticsChart();
      updateNavVisibility();
      window.scrollTo({top:0, behavior:'smooth'});
    }

    function updateNavVisibility() {
      const loggedIn = !!currentStudent;
      ['navLogin','navRegister'].forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display=loggedIn?'none':'inline'; });
      ['navDashboard','navSearch','navPrevious','navAnalytics','navProfile','navNotifications'].forEach(id=>{ const el=document.getElementById(id); if(el) el.style.display=loggedIn?'inline':'none'; });
      document.getElementById('logoutBtn').style.display = loggedIn?'inline':'none';
    }

    // ==================== PAGE TEMPLATES ====================
    function homePage() {
      return `
        <div style="text-align:center; padding:4rem 0 2rem;">
          <h1 style="font-size:3.5rem; background:var(--gradient-1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">Your Academic Journey,<br>One Dashboard</h1>
          <p style="color:var(--text-secondary); max-width:600px; margin:1rem auto;">Fast, secure, and beautifully designed university result portal.</p>
          <button class="btn btn-primary" onclick="navigateTo('login')">🔍 View Your Result</button>
        </div>
        <div class="grid-3">
          <div class="glass"><div class="stat-value" style="color:var(--primary);">10k+</div>Students</div>
          <div class="glass"><div class="stat-value" style="color:var(--accent);">50+</div>Programs</div>
          <div class="glass"><div class="stat-value" style="color:var(--success);">99.8%</div>Uptime</div>
        </div>
      `;
    }
    function loginPage() {
      return `<div class="glass" style="max-width:400px; margin:2rem auto;"><h2>Student Login</h2>
        <form id="loginForm">
          <div class="form-group"><label>Enrollment Number</label><input type="text" id="loginEnroll" required></div>
          <div class="form-group"><label>Password</label><input type="password" id="loginPass" required></div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Login</button>
        </form>
        <p style="text-align:center; margin-top:1rem; color:var(--text-secondary);">Demo: <b>ENR2024001</b> / <b>123456</b></p>
      </div>`;
    }
    function registerPage() {
      return `<div class="glass" style="max-width:500px; margin:2rem auto;"><h2>Register</h2>
        <form id="registerForm">
          <div class="grid-2">
            <div class="form-group"><label>Full Name</label><input type="text" id="regName" required></div>
            <div class="form-group"><label>Enrollment No.</label><input type="text" id="regEnroll" required></div>
          </div>
          <div class="form-group"><label>Email</label><input type="email" id="regEmail" required></div>
          <div class="form-group"><label>Password</label><input type="password" id="regPass" required></div>
          <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form></div>`;
    }
    function dashboardPage() {
      if (!currentStudent) return '<p>Please login.</p>';
      const p = currentStudent.profile;
      const latestResult = currentStudent.results[currentStudent.results.length-1] || {};
      return `<h2>Welcome, ${p.name}</h2>
        <div class="grid-3">
          <div class="glass"><div class="stat-value" style="color:var(--primary);">${latestResult.sgpa||'N/A'}</div>Latest SGPA</div>
          <div class="glass"><div class="stat-value" style="color:var(--accent);">${latestResult.cgpa||'N/A'}</div>CGPA</div>
          <div class="glass"><div class="stat-value" style="color:var(--warning);">${currentStudent.attendance}%</div>Attendance</div>
        </div>
        <div class="glass" style="margin-top:1rem;"><h3>Quick Links</h3>
          <button class="btn btn-outline btn-sm" onclick="navigateTo('search')">Search Result</button>
          <button class="btn btn-outline btn-sm" onclick="navigateTo('previous')">Previous Semesters</button>
        </div>`;
    }
    function searchPage() {
      return `<div class="glass" style="max-width:500px; margin:0 auto;"><h2>Find Result</h2>
        <div class="form-group"><label>Enrollment Number</label><input type="text" id="searchEnroll" placeholder="e.g., ENR2024001"></div>
        <div class="form-group"><label>Semester</label><select id="searchSem"><option value="0">All Semesters</option>${[1,2,3,4,5,6].map(s=>`<option value="${s}">Semester ${s}</option>`).join('')}</select></div>
        <button class="btn btn-primary" id="searchBtn">Search</button>
        <div id="searchOutput" style="margin-top:1rem;"></div>
      </div>`;
    }
    function renderResultPage() {
      // Result page is shown after search
      const params = new URLSearchParams(window.location.search);
      const enroll = params.get('enroll');
      const sem = parseInt(params.get('sem')) || 0;
      if (!enroll || !db.students[enroll]) return '<p>Student not found.</p>';
      const student = db.students[enroll];
      const results = sem ? student.results.filter(r=>r.sem===sem) : student.results;
      if (results.length===0) return '<p>No results for this semester.</p>';
      const latest = results[results.length-1];
      let html = `<div class="glass"><h2>Result: ${student.profile.name}</h2>
        <p>Enrollment: ${student.profile.enrollment} | Roll: ${student.profile.roll}</p>
        <p>Course: ${student.profile.course} | Semester: ${latest.sem}</p>
        <table><tr><th>Subject</th><th>Internal</th><th>External</th><th>Total</th><th>Grade</th></tr>`;
      latest.subjects.forEach(s => {
        html+=`<tr><td>${s.name}</td><td>${s.internal}</td><td>${s.external}</td><td>${s.total}</td><td><span style="color:${s.grade.includes('A')?'var(--success)':'var(--warning)'}">${s.grade}</span></td></tr>`;
      });
      html+=`</table><p style="margin-top:1rem;"><strong>SGPA:</strong> ${latest.sgpa} | <strong>CGPA:</strong> ${latest.cgpa}</p>
        <div style="margin-top:1rem;"><button class="btn btn-primary btn-sm" onclick="window.print()">🖨️ Print</button></div></div>`;
      return html;
    }
    function previousResultsPage() {
      if (!currentStudent) return '<p>Login first.</p>';
      let html = '<h2>Previous Results</h2><div class="glass"><table><tr><th>Semester</th><th>SGPA</th><th>CGPA</th><th>Action</th></tr>';
      currentStudent.results.forEach(r => {
        html+=`<tr><td>Semester ${r.sem}</td><td>${r.sgpa}</td><td>${r.cgpa}</td><td><button class="btn btn-sm btn-outline" onclick="window.location.href='?page=result&enroll=${currentStudent.profile.enrollment}&sem=${r.sem}'">View</button></td></tr>`;
      });
      html+='</table></div>';
      return html;
    }
    function analyticsPage() {
      return `<div class="glass"><h2>Academic Analytics</h2><canvas id="analyticsChart" width="500" height="250"></canvas></div>`;
    }
    function profilePage() {
      if (!currentStudent) return '';
      const p = currentStudent.profile;
      return `<div class="glass"><h2>Student Profile</h2>
        <p>${p.name} | ${p.enrollment}</p><p>Course: ${p.course}</p>
        <p>Email: ${p.email} | Mobile: ${p.mobile}</p></div>`;
    }
    function notificationsPage() {
      return `<div class="glass"><h2>Notifications</h2>
        <p>📢 Exam schedule for Semester 5 released.</p>
        <p>📄 Result for Semester 4 published.</p>
        <p>🎓 Convocation ceremony on August 15.</p></div>`;
    }
    function aboutPage() {
      return `<div class="glass"><h2>About RajResult</h2>
        <p>Modern academic result portal built with passion.</p>
        <p style="color:var(--accent);">Developer: Raj Gautam · BCA Student · Cyber Security Enthusiast</p></div>`;
    }
    function contactPage() {
      return `<div class="glass" style="max-width:500px; margin:0 auto;"><h2>Contact</h2>
        <input placeholder="Name" style="width:100%; margin-bottom:0.5rem;"><br>
        <textarea placeholder="Message" style="width:100%; margin-bottom:0.5rem;"></textarea><br>
        <button class="btn btn-primary" onclick="showToast('Message sent!')">Send</button></div>`;
    }

    // ==================== EVENT HANDLERS ====================
    function handleLogin(e) {
      e.preventDefault();
      const enroll = document.getElementById('loginEnroll').value.trim();
      const pass = document.getElementById('loginPass').value;
      // simple password check (demo = 123456)
      if (db.students[enroll] && pass === '123456') {
        currentStudent = db.students[enroll];
        showToast('Login successful');
        navigateTo('dashboard');
      } else {
        showToast('Invalid credentials', 'error');
      }
    }
    function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('regName').value;
      const enroll = document.getElementById('regEnroll').value;
      const email = document.getElementById('regEmail').value;
      if (db.students[enroll]) { showToast('Enrollment already exists', 'error'); return; }
      db.students[enroll] = {
        profile: { name, enrollment:enroll, roll:'', course:'B.Sc.', semester:1, email, mobile:'', dob:'', photo:null },
        results: [],
        attendance: 0
      };
      saveDB();
      showToast('Registered! Please login.');
      navigateTo('login');
    }
    function searchResult() {
      const enroll = document.getElementById('searchEnroll').value.trim();
      const sem = document.getElementById('searchSem').value;
      if (!enroll) return;
      if (!db.students[enroll]) {
        document.getElementById('searchOutput').innerHTML = '<p style="color:var(--danger);">Student not found.</p>';
        return;
      }
      // Navigate to result page
      window.location.href = `?page=result&enroll=${enroll}&sem=${sem}`;
    }
    function drawAnalyticsChart() {
      if (!currentStudent) return;
      const canvas = document.getElementById('analyticsChart');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const sgpadata = currentStudent.results.map(r=>r.sgpa);
      const max = Math.max(...sgpadata,10);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#6366F1';
      sgpadata.forEach((sgpa,i)=>{
        const h = (sgpa/max)*(canvas.height-40);
        ctx.fillRect(i*60+40, canvas.height-h-30, 40, h);
        ctx.fillStyle='white'; ctx.font='11px Poppins'; ctx.fillText(sgpa, i*60+45, canvas.height-h-35);
        ctx.fillStyle='#6366F1';
      });
    }

    // ==================== BACKGROUND PARTICLES ====================
    const pCanvas = document.getElementById('particleCanvas');
    const pCtx = pCanvas.getContext('2d');
    pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight;
    let particles = [];
    for (let i=0;i<50;i++) {
      particles.push({
        x: Math.random()*pCanvas.width, y: Math.random()*pCanvas.height,
        r: Math.random()*2+1, speed: Math.random()*0.5+0.2,
        angle: Math.random()*Math.PI*2
      });
    }
    function animateParticles() {
      pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
      particles.forEach(p=>{
        p.x += Math.cos(p.angle)*p.speed; p.y += Math.sin(p.angle)*p.speed;
        if(p.x<0||p.x>pCanvas.width||p.y<0||p.y>pCanvas.height){
          p.x=Math.random()*pCanvas.width; p.y=Math.random()*pCanvas.height;
        }
        pCtx.beginPath(); pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
        pCtx.fillStyle='rgba(99,102,241,0.4)'; pCtx.fill();
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();
    window.addEventListener('resize',()=>{
      pCanvas.width=window.innerWidth; pCanvas.height=window.innerHeight;
    });

    // Logout
    function logout() { currentStudent=null; navigateTo('home'); showToast('Logged out'); }

    // Initial page load based on URL query
    const urlParams = new URLSearchParams(window.location.search);
    const page = urlParams.get('page') || 'home';
    navigateTo(page);
  </script>
</body>
</html>
